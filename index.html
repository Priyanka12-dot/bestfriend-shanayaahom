<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="shortcut icon" href="./public/favicon.png" type="image/x-icon">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Be My Bestfriend</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #f9a8d4 0%, #f472b6 30%, #ec4899 60%, #db2777 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Floating hearts background */
  .hearts-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .heart-float {
    position: absolute;
    animation: floatUp linear infinite;
    opacity: 0.15;
    font-size: 1.5rem;
  }

  @keyframes floatUp {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0.2; }
    100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
  }

  /* Main card */
  .card {
    position: relative;
    z-index: 10;
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(12px);
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 36px;
    padding: 40px 36px 36px;
    max-width: 420px;
    width: 92vw;
    text-align: center;
    box-shadow: 0 24px 60px rgba(190,30,100,0.25), 0 4px 16px rgba(255,255,255,0.2) inset;
    animation: cardIn 0.6s cubic-bezier(.34,1.56,.64,1) both;
  }

  @keyframes cardIn {
    from { transform: scale(0.7) translateY(40px); opacity: 0; }
    to { transform: scale(1) translateY(0); opacity: 1; }
  }

  /* Title */
  .title {
    font-family: 'Pacifico', cursive;
    font-size: clamp(1.2rem, 5vw, 1.65rem);
    color: #7c1c52;
    line-height: 1.4;
    margin-bottom: 6px;
    text-shadow: 0 2px 8px rgba(255,255,255,0.4);
  }

  .title .highlight {
    background: white;
    color: #222;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: clamp(1rem, 4.5vw, 1.4rem);
    padding: 2px 14px;
    border-radius: 10px;
    display: inline-block;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  .title .hearts-emoji { font-size: 1.3rem; }

  /* Character area */
  .character-area {
    position: relative;
    height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 12px 0;
  }

  .character {
    width: 140px;
    height: 140px;
    transition: all 0.4s cubic-bezier(.34,1.56,.64,1);
    filter: drop-shadow(0 8px 16px rgba(190,30,100,0.3));
    animation: bobble 2.5s ease-in-out infinite;
  }

  @keyframes bobble {
    0%, 100% { transform: translateY(0) rotate(-2deg); }
    50% { transform: translateY(-8px) rotate(2deg); }
  }

  .character.panic {
    animation: panic 0.4s ease-in-out infinite;
  }

  @keyframes panic {
    0%, 100% { transform: rotate(-8deg) scale(1.05); }
    50% { transform: rotate(8deg) scale(0.95); }
  }

  .character.happy {
    animation: happy 0.6s ease-in-out 3;
  }

  @keyframes happy {
    0%, 100% { transform: scale(1) rotate(0deg); }
    25% { transform: scale(1.2) rotate(-5deg); }
    75% { transform: scale(1.2) rotate(5deg); }
  }

  /* Message bubble */
  .message-bubble {
    background: white;
    border-radius: 18px;
    padding: 10px 16px;
    font-size: clamp(0.85rem, 3.5vw, 1rem);
    font-weight: 700;
    color: #7c1c52;
    box-shadow: 0 4px 12px rgba(190,30,100,0.15);
    margin-bottom: 18px;
    min-height: 46px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    animation: bubbleIn 0.4s cubic-bezier(.34,1.56,.64,1) both;
    line-height: 1.3;
  }

  .message-bubble::after {
    content: '';
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-bottom-color: white;
  }

  @keyframes bubbleIn {
    from { transform: scale(0.6) translateY(10px); opacity: 0; }
    to { transform: scale(1) translateY(0); opacity: 1; }
  }

  /* Buttons area */
  .buttons {
    display: flex;
    gap: 14px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    min-height: 70px;
  }

  .btn-yes {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: white;
    border: none;
    border-radius: 18px;
    padding: 16px 36px;
    font-size: clamp(1rem, 4vw, 1.3rem);
    font-weight: 900;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    box-shadow: 0 6px 0 #15803d, 0 8px 20px rgba(34,197,94,0.4);
    transition: all 0.12s ease;
    letter-spacing: 0.5px;
    position: relative;
  }

  .btn-yes:hover { transform: translateY(-3px); box-shadow: 0 9px 0 #15803d, 0 12px 24px rgba(34,197,94,0.45); }
  .btn-yes:active { transform: translateY(3px); box-shadow: 0 3px 0 #15803d; }

  .btn-no {
    background: linear-gradient(135deg, #ef4444, #b91c1c);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 12px 22px;
    font-size: clamp(0.82rem, 3.2vw, 1rem);
    font-weight: 800;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    box-shadow: 0 5px 0 #991b1b, 0 6px 16px rgba(239,68,68,0.4);
    transition: all 0.12s ease;
    white-space: nowrap;
  }

  .btn-no:hover { transform: translateY(-2px); box-shadow: 0 7px 0 #991b1b, 0 8px 18px rgba(239,68,68,0.45); }
  .btn-no:active { transform: translateY(3px); box-shadow: 0 2px 0 #991b1b; }

  .btn-no.shrink-1 { font-size: clamp(0.75rem, 2.8vw, 0.9rem); padding: 10px 18px; }
  .btn-no.shrink-2 { font-size: clamp(0.68rem, 2.5vw, 0.8rem); padding: 8px 14px; }
  .btn-no.shrink-3 { font-size: clamp(0.6rem, 2.2vw, 0.7rem); padding: 7px 12px; }
  .btn-no.shrink-4 { font-size: clamp(0.55rem, 2vw, 0.65rem); padding: 6px 10px; }
  .btn-no.shrink-5 { font-size: clamp(0.5rem, 1.8vw, 0.58rem); padding: 5px 8px; }

  /* Win screen */
  .win-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    animation: cardIn 0.6s cubic-bezier(.34,1.56,.64,1) both;
  }

  .win-screen.visible { display: flex; }

  .win-title {
    font-family: 'Pacifico', cursive;
    font-size: clamp(1.5rem, 6vw, 2.2rem);
    color: #7c1c52;
    text-shadow: 0 2px 8px rgba(255,255,255,0.5);
    line-height: 1.3;
  }

  .win-msg {
    font-size: clamp(0.95rem, 3.5vw, 1.1rem);
    font-weight: 700;
    color: #7c1c52;
    background: white;
    border-radius: 16px;
    padding: 12px 20px;
    box-shadow: 0 4px 12px rgba(190,30,100,0.15);
    line-height: 1.4;
  }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 14px;
    top: -20px;
    animation: confettiFall linear forwards;
    border-radius: 2px;
    z-index: 999;
  }

  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* Stage counter dots */
  .stage-dots {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-top: 14px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    transition: background 0.3s;
  }

  .dot.active { background: white; }
  .dot.done { background: rgba(255,255,255,0.7); }

  /* Shake animation for card on No click */
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px) rotate(-1deg); }
    40% { transform: translateX(8px) rotate(1deg); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  .shake { animation: shake 0.4s ease-in-out; }

  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 24px 60px rgba(190,30,100,0.25), 0 0 0 rgba(255,255,255,0); }
    50% { box-shadow: 0 24px 60px rgba(190,30,100,0.4), 0 0 40px rgba(255,200,220,0.5); }
  }
</style>
</head>

// ── Audio Context ──────────────────────────────────────────────────────────
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, type, duration, gain = 0.3, delay = 0) {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gainNode = ctx.createGain();
  osc.connect(gainNode);
  gainNode.connect(ctx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
  gainNode.gain.setValueAtTime(gain, ctx.currentTime + delay);
  gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
  osc.start(ctx.currentTime + delay);
  osc.stop(ctx.currentTime + delay + duration + 0.01);
}

function playYesSound() {
  [523, 659, 784, 1047].forEach((f, i) => playTone(f, 'sine', 0.3, 0.35, i * 0.1));
  setTimeout(() => [1047, 1319, 1568].forEach((f, i) => playTone(f, 'sine', 0.25, 0.25, i * 0.08)), 450);
}

function playNoSound() {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(300, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.5);
  gain.gain.setValueAtTime(0.25, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.65);
  // Little sob
  setTimeout(() => playTone(200, 'sine', 0.2, 0.1, 0.1), 400);
}

function playGlitchSound() {
  for (let i = 0; i < 8; i++) {
    const f = 100 + Math.random() * 800;
    playTone(f, 'square', 0.08, 0.2, i * 0.06);
  }
}

function playWinSound() {

// ── Render character ───────────────────────────────────────────────────────
function setCharacter(type) {
  const svg = document.getElementById('character');
  svg.innerHTML = characters[type] || characters.cat;
}

// ── Build dots ─────────────────────────────────────────────────────────────
function buildDots() {
  const container = document.getElementById('stageDots');
  container.innerHTML = '';
  noMessages.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i < stage ? ' done' : i === stage ? ' active' : '');
    container.appendChild(d);
  });
}

// ── Floating hearts setup ──────────────────────────────────────────────────
function spawnHeart() {
  const bg = document.getElementById('heartsBg');
  const h = document.createElement('div');
  h.className = 'heart-float';
  h.textContent = ['💕','💗','🌸','✨','💖','🌷'][Math.floor(Math.random()*6)];
  h.style.left = Math.random()*100 + 'vw';
  h.style.animationDuration = (6 + Math.random()*8) + 's';
  h.style.fontSize = (1 + Math.random()*1.5) + 'rem';
  h.style.animationDelay = (Math.random()*4) + 's';
  bg.appendChild(h);
  setTimeout(() => h.remove(), 14000);
}
setInterval(spawnHeart, 900);
for(let i=0; i<6; i++) spawnHeart();

// ── Confetti ───────────────────────────────────────────────────────────────
function launchConfetti() {
  const colors = ['#ff6b9d','#ffd700','#6bffdd','#ff9f43','#a29bfe','#fd79a8','#00cec9'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random()*100 + 'vw';
      piece.style.background = colors[Math.floor(Math.random()*colors.length)];
      piece.style.transform = `rotate(${Math.random()*360}deg)`;
      piece.style.width = (8 + Math.random()*8) + 'px';
      piece.style.height = (12 + Math.random()*8) + 'px';
      piece.style.animationDuration = (1.5 + Math.random()*2) + 's';
      piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      document.body.appendChild(piece);
      setTimeout(() => piece.remove(), 4000);
    }, i * 40);
  }
}

// ── Game Logic ─────────────────────────────────────────────────────────────
function clickYes() {
  playYesSound();
  const char = document.getElementById('character');
  char.classList.remove('panic');
  char.classList.add('happy');
  
  setCharacter('cat');
  document.getElementById('messageBubble').textContent = yesMessage;
  document.getElementById('messageBubble').style.animation = 'none';
  void document.getElementById('messageBubble').offsetWidth;
  document.getElementById('messageBubble').style.animation = '';

  launchConfetti();
  
  // Short delay then show win screen
  setTimeout(() => {
    playWinSound();
    launchConfetti();
    document.getElementById('gameContent').style.display = 'none';
    document.getElementById('winScreen').classList.add('visible');
  }, 900);
}

function clickNo() {
  if (stage >= noMessages.length) {
    // Force yes
    clickYes();
    return;
  }

  const data = noMessages[stage];

  // Sound
  if (data.char === 'glitch') {
    playGlitchSound();
  } else {
    playNoSound();
  }

  // Shake card
  const card = document.getElementById('mainCard');
  card.classList.remove('shake');
  void card.offsetWidth;
  card.classList.add('shake');
  setTimeout(() => card.classList.remove('shake'), 500);

  // Update message
  const bubble = document.getElementById('messageBubble');
  bubble.textContent = data.text;
  bubble.style.animation = 'none';
  void bubble.offsetWidth;
  bubble.style.animation = 'bubbleIn 0.4s cubic-bezier(.34,1.56,.64,1) both';

  // Update character
  setCharacter(data.char);
  const char = document.getElementById('character');
  char.classList.add('panic');
  setTimeout(() => { char.classList.remove('panic'); }, 1200);

  // Glitch effect on character
  if (data.char === 'glitch') {
    char.style.filter = 'hue-rotate(180deg) drop-shadow(0 0 10px #ff6b9d)';
    setTimeout(() => { char.style.filter = 'drop-shadow(0 8px 16px rgba(190,30,100,0.3))'; }, 800);
  }

  // Shrink the No button
  const btn = document.getElementById('btnNo');
  btn.className = 'btn-no shrink-' + Math.min(stage + 1, 5);

  // Update No button text
  const nextStage = stage + 1;
  if (nextStage < noMessages.length) {
    btn.textContent = ['No 😶', 'No 😒', 'No 🙄', 'No 🫠', 'No 😤', 'No 🥲'][nextStage] || 'No';
  } else {
    btn.textContent = 'n̸͔̪͓̎o̸̩̊̾';
  }

  stage++;
  buildDots();
}

function restart() {
  stage = 0;
  document.getElementById('winScreen').classList.remove('visible');
  document.getElementById('gameContent').style.display = '';
  document.getElementById('messageBubble').textContent = 'Click YES to be my bestie forever! 🌸';
  setCharacter('cat');
  const btn = document.getElementById('btnNo');
  btn.className = 'btn-no';
  btn.textContent = 'No 😶';
  buildDots();
}

// ── Init ───────────────────────────────────────────────────────────────────
buildDots();
</script>
